<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Sistema de Asistencia - Policía Nacional del Ecuador</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f0f2f5;
      color: #222;
      -webkit-text-size-adjust: 100%;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }
    .box {
      width: 100%;
      max-width: 1400px;
      margin: 12px;
      background: #fff;
      padding: 14px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,.1);
    }

    .header-wrap {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 2px;
      margin-bottom: 20px;
      border-bottom: 3px solid #1f4e79;
      padding-bottom: 15px;
      flex-wrap: wrap;
    }
    .seal {
      width: 54px;
      height: 54px;
      object-fit: contain;
      flex: 0 0 auto;
    }
    .seal:first-child {
      margin-left: 60px;
      margin-right: 20px;
    }
    .seal:last-child {
      margin-right: 60px;
      margin-left: 20px;
    }
    .header {
      text-align: center;
      line-height: 1.02;
      word-break: break-word;
      flex: 1;
      margin: 0;
      padding: 0;
    }
    .header .main {
      font-size: 24px;
      font-weight: 900;
      text-transform: uppercase;
      margin: 0;
      padding: 0;
      color: #1f4e79;
    }
    .header .sub1, .header .sub2 {
      font-size: 14px;
      font-weight: 400;
      text-transform: uppercase;
      margin: 0;
      padding: 0;
    }

    .print-info { display: none; margin: 15px 0 20px; font-size: 14px; }
    .print-info .row {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
      border: 1px solid #222;
      padding: 10px;
      background: #f9f9f9;
    }
    .print-info strong { font-weight: 700; }

    .grid-top, .grid-form {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 5px;
      color: #1f4e79;
    }
    .field input {
      width: 100%;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    .field input:focus {
      outline: none;
      border-color: #1f4e79;
    }

    h3 {
      margin: 20px 0 10px;
      font-size: 18px;
      color: #1f4e79;
      border-left: 4px solid #1f4e79;
      padding-left: 10px;
    }

    .signature-wrap { margin-top: 10px; }
    canvas {
      width: 100%;
      max-width: 100%;
      height: 250px;
      border: 3px solid #1f4e79;
      border-radius: 8px;
      background: #fff;
      touch-action: none;
      display: block;
      cursor: crosshair;
      background-color: #fefefe;
    }
    .canvas-container {
      position: relative;
    }
    .canvas-hint {
      position: absolute;
      bottom: 10px;
      right: 15px;
      font-size: 11px;
      color: #999;
      background: rgba(255,255,255,0.8);
      padding: 2px 8px;
      border-radius: 12px;
      pointer-events: none;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 12px;
    }
    button {
      width: 100%;
      padding: 14px;
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      background: #1f4e79;
      color: #fff;
      font-weight: 700;
      font-size: 16px;
      min-height: 48px;
      transition: transform 0.2s, opacity 0.2s;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    button:hover { opacity: 0.9; transform: translateY(-1px); }
    button.secondary { background: #6c757d; }
    button.success { background: #28a745; }
    button.danger { background: #dc3545; }
    button.warning { background: #ffc107; color: #000; }

    /* --- TABLA QUE OCUPA TODO EL ANCHO CON COLUMNAS PROPORCIONALES --- */
    .table-wrap {
      overflow-x: auto;
      margin-top: 20px;
      border-radius: 8px;
      border: 1px solid #ddd;
      background: #fff;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 10px 12px;
      font-size: 13px;
      text-align: left;
      vertical-align: middle;
      word-break: break-word;
      overflow-wrap: break-word;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    th {
      text-align: center;
      background: #1f4e79;
      color: white;
      font-weight: 600;
    }
    th:nth-child(1), td:nth-child(1) { width: 5%; text-align: center; }
    th:nth-child(2), td:nth-child(2) { width: 12%; }
    th:nth-child(3), td:nth-child(3) { width: 25%; }
    th:nth-child(4), td:nth-child(4) { width: 12%; }
    th:nth-child(5), td:nth-child(5) { width: 20%; }
    th:nth-child(6), td:nth-child(6) { width: 12%; }
    th:nth-child(7), td:nth-child(7) { width: 14%; text-align: center; }
    
    td:nth-child(1), td:nth-child(7) {
      text-align: center;
    }
    
    img.sig { 
      max-width: 140px; 
      max-height: 60px;
      min-width: 100px;
      border: none;
      background: transparent;
      box-shadow: none;
    }
    .empty-row td {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    @media (min-width: 768px) {
      body { padding: 0; }
      .box { margin: 20px auto; padding: 25px; }
      .seal { width: 90px; height: 90px; }
      .seal:first-child {
        margin-left: 120px;
        margin-right: 30px;
      }
      .seal:last-child {
        margin-right: 120px;
        margin-left: 30px;
      }
      .header .main { font-size: 32px; }
      .header .sub1, .header .sub2 { font-size: 16px; }
      .grid-top { grid-template-columns: repeat(3, 1fr); }
      .grid-form { grid-template-columns: 1.2fr 2fr 1.2fr 1.5fr 1fr; }
      .actions {
        grid-template-columns: repeat(3, 1fr);
      }
      canvas {
        height: 280px;
      }
      img.sig {
        max-width: 160px;
        max-height: 70px;
      }
    }

    @media print {
      @page {
        margin: 1.5cm;
      }
      
      body { 
        background: #fff; 
        margin: 0; 
        padding: 0;
      }
      
      .box { 
        box-shadow: none; 
        border-radius: 0; 
        padding: 0;
        margin: 0;
        max-width: 100%;
      }
      .no-print { display: none; }
      .print-info { display: block; }
      .table-wrap { 
        overflow: visible;
      }
      table { 
        width: 100%;
        table-layout: fixed;
      }
      th, td {
        padding: 8px 10px;
      }
      th { 
        background: #eee; 
        color: #000;
        text-align: center;
      }
      img.sig {
        max-width: 130px;
        max-height: 55px;
        border: none;
        background: transparent;
      }
      
      .header-wrap {
        justify-content: space-between;
      }
      
      .seal:first-child {
        margin-left: 40px;
      }
      .seal:last-child {
        margin-right: 40px;
      }
      
      .print-info .row {
        justify-content: center;
      }
      
      html, body {
        margin: 0 !important;
        padding: 0 !important;
      }
      
      @page {
        margin-top: 1.2cm;
        margin-bottom: 1.2cm;
        margin-left: 1.5cm;
        margin-right: 1.5cm;
      }
    }

    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: bold;
    }
    .badge-success { background: #d4edda; color: #155724; }
    .badge-danger { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>
  <div class="box">
    <div class="header-wrap">
      <img class="seal" src="https://raw.githubusercontent.com/Laiana2026/Reuniones/refs/heads/main/DIGIN.png" alt="Sello izquierdo">
      <div class="header">
        <div class="main">POLICÍA NACIONAL DEL ECUADOR</div>
        <div class="sub1">DIRECCIÓN GENERAL DE INVESTIGACIONES</div>
        <div class="sub2">DEPARTAMENTO DE ANÁLISIS DE LA INFORMACIÓN - C4I2</div>
      </div>
      <img class="seal" src="https://raw.githubusercontent.com/Laiana2026/Reuniones/refs/heads/main/C4I2.png" alt="Sello derecho">
    </div>

    <div class="print-info">
      <div class="row">
        <div><strong>FECHA:</strong> <span id="pFecha"></span></div>
        <div><strong>TEMA:</strong> <span id="pTema"></span></div>
        <div><strong>PRESIDE:</strong> <span id="pPreside"></span></div>
        <div><strong>TOTAL ASISTENTES:</strong> <span id="pTotal"></span></div>
      </div>
    </div>

    <div class="grid-top no-print">
      <div class="field"><label>📅 FECHA</label><input type="date" id="fecha" autocomplete="off"></div>
      <div class="field"><label>📝 TEMA</label><input type="text" id="tema" placeholder="Ej: Reunión de Coordinación" autocomplete="off"></div>
      <div class="field"><label>👤 PRESIDE</label><input type="text" id="preside" placeholder="Nombre de quien preside" autocomplete="off"></div>
    </div>

    <h3 class="no-print">✍️ Formulario de asistente</h3>
    <div class="grid-form no-print">
      <div class="field"><label>🏢 UNIDAD</label><input type="text" id="unidad" placeholder="Ej: C4I2" autocomplete="off"></div>
      <div class="field"><label>👤 APELLIDOS Y NOMBRES</label><input type="text" id="nombre" placeholder="* Obligatorio" autocomplete="off"></div>
      <div class="field"><label>⭐ GRADO Y/O CARGO</label><input type="text" id="cargo" placeholder="Ej: Capitán" autocomplete="off"></div>
      <div class="field"><label>📧 E-MAIL</label><input type="email" id="email" placeholder="ejemplo@policia.gob.ec" autocomplete="off"></div>
      <div class="field"><label>📱 TELÉFONO</label><input type="tel" id="telefono" placeholder="0999999999" autocomplete="off"></div>
    </div>

    <div class="no-print signature-wrap">
      <div class="field">
        <label>🖊️ FIRMA TÁCTIL (Dibuje aquí)</label>
        <div class="canvas-container">
          <canvas id="signaturePad" width="600" height="250"></canvas>
          <div class="canvas-hint">✍️ Dibuje con el mouse o dedo</div>
        </div>
      </div>
      <div class="actions">
        <button type="button" class="secondary" onclick="limpiarFirma()">🗑️ Limpiar firma</button>
        <button type="button" onclick="agregarAsistente()">➕ Agregar asistente</button>
        <button type="button" class="success" onclick="prepararImpresion()">🖨️ Imprimir / PDF</button>
      </div>
    </div>

    <div class="table-wrap">
      <table id="tablaAsistentes">
        <thead>
          <tr>
            <th>N°</th>
            <th>UNIDAD</th>
            <th>APELLIDOS Y NOMBRES</th>
            <th>GRADO Y/O CARGO</th>
            <th>E-MAIL</th>
            <th>TELÉFONO</th>
            <th>FIRMA</th>
          </tr>
        </thead>
        <tbody id="tabla"></tbody>
      </table>
    </div>
  </div>

  <script>
    // --- Variables globales ---
    let asistentes = [];
    let currentSignatureData = null;

    // --- Elementos DOM ---
    const fechaInput = document.getElementById('fecha');
    const canvas = document.getElementById('signaturePad');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    // --- Configuración inicial de fecha (vacío por defecto) ---
    // NO se establece ninguna fecha por defecto
    fechaInput.value = '';

    // --- Formateo de fecha en español ---
    function formatFechaES(date) {
      if (isNaN(date.getTime())) return 'No especificada';
      const f = new Intl.DateTimeFormat('es-EC', {
        weekday: 'long',
        day: 'numeric',
        month: 'long',
        year: 'numeric'
      }).format(date);
      return f.charAt(0).toUpperCase() + f.slice(1);
    }

    // --- Funciones de la firma táctil ---
    function initCanvas() {
      canvas.width = 600;
      canvas.height = 250;
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.strokeStyle = '#000';
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      currentSignatureData = null;
    }

    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const t = e.touches ? e.touches[0] : e;
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      return { 
        x: (t.clientX - rect.left) * scaleX,
        y: (t.clientY - rect.top) * scaleY
      };
    }

    function startDraw(e) {
      drawing = true;
      const p = getPos(e);
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      e.preventDefault();
    }

    function draw(e) {
      if (!drawing) return;
      const p = getPos(e);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
      e.preventDefault();
    }

    function stopDraw() { 
      drawing = false;
      currentSignatureData = canvas.toDataURL('image/png');
    }

    function limpiarFirma() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      currentSignatureData = null;
    }

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDraw);
    canvas.addEventListener('mouseleave', stopDraw);
    canvas.addEventListener('touchstart', startDraw, { passive: false });
    canvas.addEventListener('touchmove', draw, { passive: false });
    canvas.addEventListener('touchend', stopDraw);
    
    initCanvas();

    // --- Validaciones ---
    function validarEmail(email) {
      const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return email === '' || re.test(email);
    }

    function validarTelefono(tel) {
      const re = /^[0-9]{9,10}$/;
      return tel === '' || re.test(tel);
    }

    // --- Guardar en localStorage ---
    function guardarEnLocalStorage() {
      const datos = {
        asistentes: asistentes,
        fecha: fechaInput.value,
        tema: document.getElementById('tema').value,
        preside: document.getElementById('preside').value
      };
      localStorage.setItem('asistenciaPolicia', JSON.stringify(datos));
    }

    // --- LIMPIAR localStorage al iniciar para que empiece en BLANCO ---
    localStorage.removeItem('asistenciaPolicia');
    
    // --- Inicializar completamente vacío ---
    asistentes = [];
    currentSignatureData = null;

    // --- Limpiar todos los campos del formulario ---
    function limpiarTodosLosCampos() {
      ['unidad', 'nombre', 'cargo', 'email', 'telefono'].forEach(id => {
        const campo = document.getElementById(id);
        if (campo) campo.value = '';
      });
      // Limpiar fecha, tema y preside
      if (fechaInput) fechaInput.value = '';
      const temaInput = document.getElementById('tema');
      const presideInput = document.getElementById('preside');
      if (temaInput) temaInput.value = '';
      if (presideInput) presideInput.value = '';
    }

    // --- Renderizar tabla ---
    function renderTabla() {
      const tbody = document.getElementById('tabla');
      if (asistentes.length === 0) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="7">📋 No hay asistentes registrados. Complete el formulario y presione "Agregar asistente"</td></tr>';
        return;
      }
      
      tbody.innerHTML = '';
      asistentes.forEach((a, i) => {
        const emailValid = validarEmail(a.email);
        const telefonoValid = validarTelefono(a.telefono);
        tbody.innerHTML += `
          <tr>
            <td>${i + 1}</td>
            <td>${escapeHtml(a.unidad)}</td>
            <td><strong>${escapeHtml(a.nombre)}</strong></td>
            <td>${escapeHtml(a.cargo)}</td>
            <td>${escapeHtml(a.email)} ${!emailValid && a.email ? '<span class="badge badge-danger">inválido</span>' : ''}</td>
            <td>${escapeHtml(a.telefono)} ${!telefonoValid && a.telefono ? '<span class="badge badge-danger">inválido</span>' : ''}</td>
            <td>${a.firma ? '<img class="sig" src="'+a.firma+'" alt="firma">' : '<span class="badge badge-danger">Sin firma</span>'}</td>
          </tr>
        `;
      });
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    function limpiarCamposFormulario() {
      ['unidad', 'nombre', 'cargo', 'email', 'telefono'].forEach(id => {
        const campo = document.getElementById(id);
        if (campo) campo.value = '';
      });
      document.getElementById('nombre').focus();
    }

    function agregarAsistente() {
      const unidad = document.getElementById('unidad').value.trim();
      const nombre = document.getElementById('nombre').value.trim();
      const cargo = document.getElementById('cargo').value.trim();
      const email = document.getElementById('email').value.trim();
      const telefono = document.getElementById('telefono').value.trim();
      
      const firma = currentSignatureData || '';

      if (!nombre) {
        alert('❌ El campo NOMBRE-APELLIDO es obligatorio.');
        return;
      }

      if (email !== '' && !validarEmail(email)) {
        alert('❌ El correo electrónico no es válido.');
        return;
      }

      if (telefono !== '' && !validarTelefono(telefono)) {
        alert('❌ El teléfono debe tener 9 o 10 dígitos numéricos.');
        return;
      }

      const asistente = { unidad, nombre, cargo, email, telefono, firma };
      asistentes.push(asistente);
      alert('✅ Asistente agregado correctamente');

      renderTabla();
      limpiarCamposFormulario();
      limpiarFirma();
      guardarEnLocalStorage();
    }

    function prepararImpresion() {
      let fechaSeleccionada;
      if (fechaInput.value) {
        fechaSeleccionada = new Date(fechaInput.value + 'T00:00:00');
      } else {
        fechaSeleccionada = new Date();
      }
      document.getElementById('pFecha').textContent = formatFechaES(fechaSeleccionada);
      document.getElementById('pTema').textContent = document.getElementById('tema').value || 'No especificado';
      document.getElementById('pPreside').textContent = document.getElementById('preside').value || 'No especificado';
      document.getElementById('pTotal').textContent = asistentes.length;
      
      let hayErrores = false;
      asistentes.forEach(a => {
        if (a.email !== '' && !validarEmail(a.email)) hayErrores = true;
        if (a.telefono !== '' && !validarTelefono(a.telefono)) hayErrores = true;
      });
      
      if (hayErrores) {
        if (!confirm('⚠️ Hay correos o teléfonos con formato inválido. ¿Desea imprimir de todas formas?')) {
          return;
        }
      }
      
      window.print();
    }

    window.addEventListener('beforeunload', () => {
      if (asistentes.length > 0) {
        guardarEnLocalStorage();
      }
    });

    // Inicializar TODO vacío
    limpiarTodosLosCampos();
    renderTabla();
    limpiarCamposFormulario();
    initCanvas();
  </script>
</body>
</html>
